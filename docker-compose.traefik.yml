# Федерация из 3 банков за Traefik (один хост, домены через env).
#
# Запуск:
#   cp .env.federation.example .env        # задай домены и креды команды
#   docker compose -f docker-compose.traefik.yml up --build
#
# Traefik маршрутизирует по Host:
#   https?://$VBANK_DOMAIN -> vbank, $ABANK_DOMAIN -> abank, $SBANK_DOMAIN -> sbank
# По умолчанию домены *.localhost (резолвятся в 127.0.0.1 в браузере).
#
# Межбанк ходит ВНУТРИ docker-сети по именам сервисов (http://vbank:8000),
# наружу — по твоим доменам через Traefik. Менять INTERBANK_* не нужно.

name: bank-federation

x-bank-env: &bank-env
  SECRET_KEY: ${SECRET_KEY:-federation-shared-secret-change-me}
  ALGORITHM: HS256
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  API_VERSION: "2.1"
  KNOWN_BANKS: vbank,abank,sbank
  INTERBANK_URL_TEMPLATE: http://{code}:8000
  INTERBANK_TIMEOUT: "10"
  INTERBANK_SHARED_SECRET: ${INTERBANK_SHARED_SECRET:-interbank-secret-change-me}
  TEAM_CLIENT_ID: ${TEAM_CLIENT_ID:-team200}
  TEAM_CLIENT_SECRET: ${TEAM_CLIENT_SECRET:-5OAaa4DYzYKfnOU6zbR34ic5qMm7VSMB}
  SEED_CLIENTS: ${SEED_CLIENTS:-2}
  SEED_BALANCE: ${SEED_BALANCE:-1000000}

x-db-env: &db-env
  POSTGRES_USER: bankuser
  POSTGRES_PASSWORD: bankpass

x-bank-service: &bank-service
  build:
    context: .
    dockerfile: Dockerfile
  command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
  volumes:
    - ./shared/keys:/app/shared/keys:ro
    - ./frontend:/app/frontend:ro
  restart: unless-stopped

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # Дашборд (необязательно): http://localhost:8090/dashboard/
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # ===== VBANK =====
  vbank-db:
    image: postgres:15-alpine
    environment:
      <<: *db-env
      POSTGRES_DB: vbank_db
    volumes:
      - vbank_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser"]
      interval: 5s
      timeout: 5s
      retries: 10

  vbank:
    <<: *bank-service
    container_name: vbank
    environment:
      <<: *bank-env
      BANK_CODE: vbank
      BANK_NAME: Virtual Bank
      DATABASE_URL: postgresql://bankuser:bankpass@vbank-db:5432/vbank_db
      PUBLIC_URL: http://${VBANK_DOMAIN:-vbank.localhost}
    labels:
      - traefik.enable=true
      - traefik.http.routers.vbank.rule=Host(`${VBANK_DOMAIN:-vbank.localhost}`)
      - traefik.http.routers.vbank.entrypoints=web
      - traefik.http.services.vbank.loadbalancer.server.port=8000
    depends_on:
      vbank-db:
        condition: service_healthy

  # ===== ABANK =====
  abank-db:
    image: postgres:15-alpine
    environment:
      <<: *db-env
      POSTGRES_DB: abank_db
    volumes:
      - abank_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser"]
      interval: 5s
      timeout: 5s
      retries: 10

  abank:
    <<: *bank-service
    container_name: abank
    environment:
      <<: *bank-env
      BANK_CODE: abank
      BANK_NAME: Awesome Bank
      DATABASE_URL: postgresql://bankuser:bankpass@abank-db:5432/abank_db
      PUBLIC_URL: http://${ABANK_DOMAIN:-abank.localhost}
    labels:
      - traefik.enable=true
      - traefik.http.routers.abank.rule=Host(`${ABANK_DOMAIN:-abank.localhost}`)
      - traefik.http.routers.abank.entrypoints=web
      - traefik.http.services.abank.loadbalancer.server.port=8000
    depends_on:
      abank-db:
        condition: service_healthy

  # ===== SBANK =====
  sbank-db:
    image: postgres:15-alpine
    environment:
      <<: *db-env
      POSTGRES_DB: sbank_db
    volumes:
      - sbank_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser"]
      interval: 5s
      timeout: 5s
      retries: 10

  sbank:
    <<: *bank-service
    container_name: sbank
    environment:
      <<: *bank-env
      BANK_CODE: sbank
      BANK_NAME: Super Bank
      DATABASE_URL: postgresql://bankuser:bankpass@sbank-db:5432/sbank_db
      PUBLIC_URL: http://${SBANK_DOMAIN:-sbank.localhost}
    labels:
      - traefik.enable=true
      - traefik.http.routers.sbank.rule=Host(`${SBANK_DOMAIN:-sbank.localhost}`)
      - traefik.http.routers.sbank.entrypoints=web
      - traefik.http.services.sbank.loadbalancer.server.port=8000
    depends_on:
      sbank-db:
        condition: service_healthy

volumes:
  vbank_data:
  abank_data:
  sbank_data:
